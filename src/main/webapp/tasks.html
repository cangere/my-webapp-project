<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO List Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        #taskInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        #taskInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #addBtn {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        #addBtn:hover {
            background: #5568d3;
        }

        #addBtn:active {
            transform: scale(0.98);
        }

        .tasks-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 6px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .task-item:hover {
            background: #efefef;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .task-text {
            flex: 1;
            color: #333;
            font-size: 1em;
        }

        .delete-btn {
            padding: 6px 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.9em;
            cursor: pointer;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: #ff5252;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 1.1em;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            text-align: center;
            color: #667eea;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 TODO List</h1>
        
        <div class="error-message" id="errorMsg"></div>

        <div class="input-group">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Enter a new task..." 
                autocomplete="off"
            >
            <button id="addBtn">Add Task</button>
        </div>

        <div id="loadingDiv" class="loading" style="display: none;">Loading tasks...</div>
        
        <ul class="tasks-list" id="tasksList"></ul>

        <div class="empty-message" id="emptyMsg" style="display: none;">
            No tasks yet. Add one to get started!
        </div>
    </div>

    <script>
        const API_BASE = '/my-webapp-project/api/tasks';
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const tasksList = document.getElementById('tasksList');
        const errorMsg = document.getElementById('errorMsg');
        const emptyMsg = document.getElementById('emptyMsg');
        const loadingDiv = document.getElementById('loadingDiv');

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
            setTimeout(() => {
                errorMsg.classList.remove('show');
            }, 4000);
        }

        async function loadTasks() {
            loadingDiv.style.display = 'block';
            try {
                const response = await fetch(API_BASE);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const tasks = await response.json();
                renderTasks(tasks);
            } catch (err) {
                showError('Failed to load tasks: ' + err.message);
                tasksList.innerHTML = '';
                emptyMsg.style.display = 'block';
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        function renderTasks(tasks) {
            tasksList.innerHTML = '';
            if (tasks.length === 0) {
                emptyMsg.style.display = 'block';
                return;
            }
            emptyMsg.style.display = 'none';
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-item ${task.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <input 
                        type="checkbox" 
                        class="task-checkbox" 
                        ${task.completed ? 'checked' : ''}
                        data-id="${task.id}"
                    >
                    <span class="task-text">${escapeHtml(task.title)}</span>
                    <button class="delete-btn" data-id="${task.id}">Delete</button>
                `;
                tasksList.appendChild(li);

                const checkbox = li.querySelector('.task-checkbox');
                const deleteBtn = li.querySelector('.delete-btn');

                checkbox.addEventListener('change', () => toggleTask(task.id, checkbox.checked));
                deleteBtn.addEventListener('click', () => deleteTask(task.id));
            });
        }

        async function addTask() {
            const title = taskInput.value.trim();
            if (!title) {
                showError('Please enter a task title');
                return;
            }

            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ title, completed: false })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                taskInput.value = '';
                taskInput.focus();
                await loadTasks();
            } catch (err) {
                showError('Failed to add task: ' + err.message);
            }
        }

        async function deleteTask(id) {
            if (!confirm('Are you sure you want to delete this task?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/${id}`, {
                    method: 'DELETE'
                });

                if (response.status === 404) {
                    showError('Task not found');
                } else if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                await loadTasks();
            } catch (err) {
                showError('Failed to delete task: ' + err.message);
            }
        }

        async function toggleTask(id, completed) {
            try {
                const response = await fetch(`${API_BASE}/${id}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ completed })
                });

                if (!response.ok && response.status !== 405) {
                    throw new Error(`HTTP ${response.status}`);
                }

                await loadTasks();
            } catch (err) {
                showError('Failed to update task: ' + err.message);
                await loadTasks();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        // Load tasks on page load
        loadTasks();

        // Refresh tasks every 30 seconds (optional)
        setInterval(loadTasks, 30000);
    </script>
</body>
</html>
